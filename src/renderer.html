<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AreaForge</title>
    <style>
      body { font-family: Inter, system-ui, -apple-system, sans-serif; margin: 0; background: #0b1020; color: #e9eefc; }
      .wrap { padding: 20px; display: grid; grid-template-rows: auto auto 1fr; gap: 12px; height: 100vh; box-sizing: border-box; }
      .row { display: flex; gap: 8px; align-items: center; }
      input, button, textarea { border-radius: 8px; border: 1px solid #2a355f; }
      input { padding: 10px; background:#141c36; color:#e9eefc; }
      button { padding: 10px 12px; background:#355dff; color:white; border:0; cursor:pointer; }
      button.secondary { background:#2c3a63; }
      button:disabled { opacity:.6; cursor:not-allowed; }
      #address { flex:1; }
      #radius { width:90px; }
      #status { color:#a9b6dc; min-height: 1.2rem; }
      textarea { width:100%; height:100%; background:#0f1730; color:#e9eefc; padding:12px; resize:none; }
      .hint { font-size:12px; color:#91a1d6; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <input id="address" placeholder="Address, City, State" />
        <input id="radius" type="number" min="1" value="10" />
        <button id="generate">Generate</button>
        <button id="saveMd" class="secondary" disabled>Save .md</button>
        <button id="savePdf" class="secondary" disabled>Export PDF</button>
      </div>
      <div id="status">Ready.</div>
      <textarea id="report" placeholder="Generated area study will appear here..."></textarea>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
